dataset_train: Waymo_Multi(allow_repeat=${allow_repeat}, split=None, ROOT="/home/baoheng/waymo/training", modality="${modality}",
  aug_crop=16, resolution=[(518, 392), (518, 336), (518, 294), (518, 266), (518, 210), (518, 154), (392, 518), (336, 518), (294, 518), (266, 518)],  
  transform=SeqColorJitter, num_views=${num_views}, n_corres=${n_corres_train})
dataset_test: Waymo_Multi(allow_repeat=${allow_repeat}, split=None, ROOT="/home/baoheng/waymo/validation", modality="${modality}",
  aug_crop=16, resolution=[(518, 336)],  
  transform=SeqColorJitter, num_views=${num_views}, n_corres=${n_corres_test})

train_dataset: 8000 @ ${dataset_train}
test_dataset: 500 @ ${dataset_test}
#test_dataset: 1000 @ ARKitScenes_Multi(split='test', ROOT='/home/bhzhang/Documents/datasets/ARKitScenes/preprocessed_stream', resolution=(518, 392), num_views=${num_test_views}, seed=42, n_corres=${n_corres_test})

modality: "rgb"

seed: 0
batch_size: 1
accum_iter: 1
gradient_checkpointing: False
epochs: 20
start_epoch: 0
start_step: 0
weight_decay: 0.05
lr: 1e-5
min_lr: 1e-7
warmup_epochs: 0.5
amp: 1

num_workers: 12
world_size: 1
local-rank: -1
dist_url: 'env://'
rank: 0
gpu: 0
distributed: False
dist_backend: 'nccl'

eval_freq: 1
save_freq: 0.1
max_checkpoints: 10
keep_freq: 1
print_freq: 10
print_img_freq: 50000000
num_imgs_vis: 4
save_dir: '../checkpoints'
exp_name: 'rgb'
task: 'VGGT'
logdir: ${save_dir}/${exp_name}/logs
output_dir: ${save_dir}/${exp_name}/
hydra:
  verbose: True
  run:

    dir: ${save_dir}/${exp_name}
